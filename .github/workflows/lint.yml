name: Lint

on:
  pull_request:
    paths:
      - '**.py'
      - 'ruff.toml'
      - 'pyproject.toml'
      - '.github/workflows/lint.yml'

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install tox
        run: uv tool install tox --with tox-uv

      - name: Run lint
        run: tox -e lint